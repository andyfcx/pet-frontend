name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build DMG (${{ matrix.arch }})
        run: zsh scripts/build_macos_dmg.sh
        env:
          TARGET_ARCH: ${{ matrix.arch }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches.Groups[1].Value
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create virtualenv and install dependencies
        shell: pwsh
        run: |
          uv venv .venv-win
          uv pip install --python .venv-win\Scripts\python.exe . pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: .venv-win\Scripts\pyinstaller.exe --clean --noconfirm run_windows.spec
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: iscc /DAppVersion=${{ steps.version.outputs.version }} installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist\*-setup.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/dmg-arm64/*.dmg
            artifacts/dmg-x86_64/*.dmg
            artifacts/windows-installer/*.exe
